<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1 class="brand">Omega<strong>Fleet</strong></h1>
      <p>Acesse sua conta para gerenciar sua frota</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="login-form">
      <div class="form-group">
        <label for="identifier">E-mail ou CPF</label>
        <input type="text" id="identifier" formControlName="identifier" [class.is-invalid]="loginForm.get('identifier')?.invalid && loginForm.get('identifier')?.touched">        
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" formControlName="password" placeholder="Digite sua senha"
          [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
      </div>

      <button type="submit" class="btn-login" [disabled]="loginForm.invalid || loading">
        {{ loading ? 'Autenticando...' : 'Entrar' }}
      </button>

      <p *ngIf="errorMessage" class="error-msg">{{ errorMessage }}</p>
    </form>

    <div class="login-footer">
      <a href="#">Esqueceu a senha?</a>
    </div>
  </div>
</div>
