<div class="list-container">
  <div class="list-header">
    <div class="title-area">
      <h1>Abertura de Nova Viagem</h1>
      <button class="btn-secondary" routerLink="/Admin/trips">Voltar</button>
    </div>
  </div>

  <div class="table-card p-4">
    <form [formGroup]="tripForm" (ngSubmit)="onSubmit()">
      <div class="row">
        <div class="col-md-6 mb-4">
          <label class="form-label fw-bold">Produto</label>
          <select class="form-select modern-select" formControlName="productId">
            <option value="" disabled selected>Selecione o produto</option>
            <option *ngFor="let product of availableProducts" [value]="product.id || product.Id">
              {{ product.name || product.Name }}
            </option>
          </select>
        </div>

        <div class="col-md-6 mb-4">
          <label class="form-label fw-bold">Cliente</label>
          <input type="text" class="form-control" formControlName="clientName" placeholder="Ex: Cooperativa Alfa">
        </div>

        <div class="col-md-6 mb-4">
          <label class="form-label fw-bold">Veículo / Placa</label>
          <select class="form-select modern-select" formControlName="vehicleId" (change)="onVehicleChange($event)">
            <option value="" disabled selected>Selecione o veículo</option>
            <option *ngFor="let v of activeVehicles" [value]="v.id">
              {{ v.licensePlate }} - {{ v.manufacturer }} - {{ v.color }}
            </option>
          </select>
          <small class="text-muted" *ngIf="isAdmin">Apenas veículos com motoristas vinculados aparecem aqui.</small>
        </div>

        <div class="col-md-6 mb-4">
          <label class="form-label fw-bold">Motorista</label>
          <div class="input-group">
            <span class="input-group-text bg-light"><i class="bi bi-person-badge"></i></span>
            <input type="text" class="form-control" [value]="selectedDriverDisplay"
              placeholder="Motorista associado aparecerá aqui" readonly>
          </div>
          <input type="hidden" formControlName="driverId">
        </div>

        <div class="col-md-4 mb-3">
          <label class="form-label fw-bold">Comissão do Motorista</label>
          <select class="form-select modern-select" formControlName="commissionPercent">
            <option [ngValue]="null">Selecione a comissão</option>
            <option *ngFor="let commission of selectedDriverCommissionRates" [ngValue]="commission">
              {{ commission | number:'1.0-2' }} %
            </option>
          </select>
        </div>

        <hr class="my-3 text-faded">

        <div class="col-md-12 mb-3">
          <label class="form-label fw-bold">Local de Carregamento</label>
          <input type="text" class="form-control" formControlName="loadingLocation"
            placeholder="Ex: Porto de Santos / Terminal 4">
        </div>

        <div class="col-md-12 mb-3">
          <label class="form-label fw-bold">Destino</label>
          <input type="text" class="form-control" formControlName="unloadingLocation"
            placeholder="Ex: CD Guarulhos - Docas 3">
        </div>

        <div class="col-md-4 mb-3">
          <label class="form-label fw-bold">Data</label>
          <input type="date" class="form-control" formControlName="loadingDate">
        </div>

        <div class="col-md-4 mb-3">
          <label class="form-label fw-bold">KM Inicial</label>
          <input type="number" class="form-control" formControlName="startKm" placeholder="0">
        </div>

        <div class="col-md-4 mb-3">
          <label class="form-label fw-bold">Valor da Tonelada</label>
          <div class="input-group">
            <span class="input-group-text">R$</span>
            <input type="text" class="form-control" placeholder="0,00" (input)="formatTonMoney($event)" #freightInput>
          </div>
          <input type="hidden" formControlName="tonValue">
        </div>

        <div class="col-md-4 mb-3">
          <label class="form-label fw-bold">Peso Carregado (T) - opcional</label>
          <input type="text" inputmode="decimal" class="form-control" [value]="loadedWeightDisplay" placeholder="0,000" (input)="onLoadedWeightChange($event)">
          <small class="text-muted">Se preferir, abra a viagem agora e informe o peso depois em Editar Abertura.</small>
        </div>

        <div class="col-md-4 mb-3">
          <label class="form-label fw-bold">Valor Total do Frete</label>
          <div class="input-group">
            <span class="input-group-text">R$</span>
            <input
              type="text"
              class="form-control"
              [value]="(tripForm.get('freightValue')?.value || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })"
              readonly>
          </div>
          <input type="hidden" formControlName="freightValue">
        </div>

        <div class="col-md-12 mb-4">
          <label class="form-label fw-bold">Comprovante / Ordem (Anexo)</label>
          <input type="file" class="form-control" (change)="onFileSelected($event)">
        </div>
      </div>

      <div class="d-flex justify-content-end gap-3 mt-4">
        <button type="button" class="btn btn-light" (click)="resetForm()">Limpar</button>
        <button type="submit" class="btn-new" [disabled]="tripForm.invalid">
          Confirmar e Abrir Viagem
        </button>
      </div>
    </form>
  </div>
</div>
