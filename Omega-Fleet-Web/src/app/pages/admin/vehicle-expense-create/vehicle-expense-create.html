<div class="list-container">
  <header class="list-header">
    <div class="title-area">
      <h1>Lancar Despesa de Veiculo</h1>
      <button class="btn-secondary" type="button" (click)="goBack()">Voltar para veiculos</button>
    </div>
  </header>

  <div class="table-card form-card">
    <form (ngSubmit)="submit()">
      <section class="form-section">
        <h2>Dados da Despesa</h2>
        <div class="form-grid">
          <div class="form-group">
            <label>Veiculo *</label>
            <select class="modern-select" [(ngModel)]="form.vehicleId" name="vehicleId" [disabled]="saving || loadingVehicles">
              <option value="">Selecione...</option>
              <option *ngFor="let vehicle of vehicles" [value]="vehicle.id">
                {{ vehicle.licensePlate }} - {{ vehicle.manufacturer }}
              </option>
            </select>
            <small *ngIf="loadingVehicles">Carregando veiculos...</small>
          </div>

          <div class="form-group">
            <label>Tipo de despesa *</label>
            <select class="modern-select" [(ngModel)]="form.expenseTypeId" name="expenseTypeId" [disabled]="saving || loadingExpenseTypes">
              <option value="">Selecione...</option>
              <option *ngFor="let type of expenseTypes" [value]="type.id || type.expenseTypeId">
                {{ type.name || type.description }}
              </option>
            </select>
            <small *ngIf="loadingExpenseTypes">Carregando tipos...</small>
          </div>

          <div class="form-group full">
            <label>Descricao *</label>
            <input
              class="modern-select"
              type="text"
              [(ngModel)]="form.description"
              name="description"
              placeholder="Ex: manutencao preventiva, lavagem, pneus..."
              [disabled]="saving"
            />
          </div>

          <div class="form-group">
            <label>Valor (R$) *</label>
            <input
              class="modern-select"
              type="number"
              min="0.01"
              step="0.01"
              [(ngModel)]="form.value"
              name="value"
              [disabled]="saving"
            />
          </div>
        </div>
      </section>

      <p class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</p>
      <p class="success-msg" *ngIf="successMessage">{{ successMessage }}</p>

      <footer class="actions">
        <button class="btn-secondary" type="button" (click)="goBack()" [disabled]="saving">Cancelar</button>
        <button type="submit" class="btn-new" [disabled]="saving">
          {{ saving ? 'Salvando...' : 'Salvar despesa' }}
        </button>
      </footer>
    </form>
  </div>
</div>
